<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- Sidebar Fragment -->
    <aside th:fragment="sidebar" 
           class="fixed left-0 top-16 w-64 h-full bg-white shadow-lg transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out z-40"
           x-data="{ sidebarOpen: false }"
           :class="{ 'translate-x-0': sidebarOpen }">
        
        <nav class="mt-5 px-2">
            <!-- Main Navigation -->
            <div class="space-y-1">
                <!-- Home -->
                <a th:href="@{/}" 
                   th:classappend="${currentPage == 'home' ? 'bg-blue-100 text-blue-700' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'}"
                   class="group flex items-center px-2 py-2 text-sm font-medium rounded-md">
                    <i class="fas fa-home mr-3 text-lg"></i>
                    홈
                </a>

                <!-- Courses -->
                <div x-data="{ open: false }">
                    <button @click="open = !open" 
                            class="w-full group flex items-center justify-between px-2 py-2 text-sm font-medium rounded-md text-gray-600 hover:bg-gray-50 hover:text-gray-900">
                        <div class="flex items-center">
                            <i class="fas fa-graduation-cap mr-3 text-lg"></i>
                            강좌
                        </div>
                        <i class="fas fa-chevron-down transition-transform" :class="{ 'rotate-180': open }"></i>
                    </button>
                    <div x-show="open" class="mt-1 space-y-1 pl-8">
                        <a th:href="@{/courses}" class="group flex items-center px-2 py-2 text-sm text-gray-600 hover:text-gray-900">
                            전체 강좌
                        </a>
                        <a th:href="@{/my-courses}" class="group flex items-center px-2 py-2 text-sm text-gray-600 hover:text-gray-900">
                            내 강좌
                        </a>
                        <a th:href="@{/course-reservation}" class="group flex items-center px-2 py-2 text-sm text-gray-600 hover:text-gray-900">
                            강좌 예약
                        </a>
                    </div>
                </div>

                <!-- My Pets -->
                <a th:href="@{/my-pets}" 
                   th:classappend="${currentPage == 'my-pets' ? 'bg-blue-100 text-blue-700' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'}"
                   class="group flex items-center px-2 py-2 text-sm font-medium rounded-md">
                    <i class="fas fa-paw mr-3 text-lg"></i>
                    내 반려동물
                </a>

                <!-- Trainers -->
                <a th:href="@{/trainers}" 
                   th:classappend="${currentPage == 'trainers' ? 'bg-blue-100 text-blue-700' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'}"
                   class="group flex items-center px-2 py-2 text-sm font-medium rounded-md">
                    <i class="fas fa-user-tie mr-3 text-lg"></i>
                    훈련사
                </a>

                <!-- Institutes -->
                <a th:href="@{/institutes}" 
                   th:classappend="${currentPage == 'institutes' ? 'bg-blue-100 text-blue-700' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'}"
                   class="group flex items-center px-2 py-2 text-sm font-medium rounded-md">
                    <i class="fas fa-building mr-3 text-lg"></i>
                    기관
                </a>

                <!-- Community -->
                <a th:href="@{/community}" 
                   th:classappend="${currentPage == 'community' ? 'bg-blue-100 text-blue-700' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'}"
                   class="group flex items-center px-2 py-2 text-sm font-medium rounded-md">
                    <i class="fas fa-users mr-3 text-lg"></i>
                    커뮤니티
                </a>

                <!-- Events -->
                <a th:href="@{/events}" 
                   th:classappend="${currentPage == 'events' ? 'bg-blue-100 text-blue-700' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'}"
                   class="group flex items-center px-2 py-2 text-sm font-medium rounded-md">
                    <i class="fas fa-calendar-alt mr-3 text-lg"></i>
                    이벤트
                </a>

                <!-- Shop -->
                <a th:href="@{/shop}" 
                   th:classappend="${currentPage == 'shop' ? 'bg-blue-100 text-blue-700' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'}"
                   class="group flex items-center px-2 py-2 text-sm font-medium rounded-md">
                    <i class="fas fa-shopping-cart mr-3 text-lg"></i>
                    쇼핑
                </a>
            </div>

            <!-- Divider -->
            <div class="my-6 border-t border-gray-200"></div>

            <!-- Trainer Features (if user is trainer) -->
            <div th:if="${user?.role == 'TRAINER'}" class="space-y-1">
                <h3 class="px-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">
                    훈련사 메뉴
                </h3>
                <a th:href="@{/trainer/dashboard}" 
                   class="group flex items-center px-2 py-2 text-sm font-medium rounded-md text-gray-600 hover:bg-gray-50 hover:text-gray-900">
                    <i class="fas fa-tachometer-alt mr-3 text-lg"></i>
                    대시보드
                </a>
                <a th:href="@{/trainer/courses}" 
                   class="group flex items-center px-2 py-2 text-sm font-medium rounded-md text-gray-600 hover:bg-gray-50 hover:text-gray-900">
                    <i class="fas fa-chalkboard-teacher mr-3 text-lg"></i>
                    내 강좌 관리
                </a>
                <a th:href="@{/trainer/students}" 
                   class="group flex items-center px-2 py-2 text-sm font-medium rounded-md text-gray-600 hover:bg-gray-50 hover:text-gray-900">
                    <i class="fas fa-user-graduate mr-3 text-lg"></i>
                    수강생 관리
                </a>
            </div>

            <!-- Institute Admin Features (if user is institute admin) -->
            <div th:if="${user?.role == 'INSTITUTE_ADMIN'}" class="space-y-1">
                <h3 class="px-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">
                    기관 관리
                </h3>
                <a th:href="@{/institute-admin/dashboard}" 
                   class="group flex items-center px-2 py-2 text-sm font-medium rounded-md text-gray-600 hover:bg-gray-50 hover:text-gray-900">
                    <i class="fas fa-chart-bar mr-3 text-lg"></i>
                    관리 대시보드
                </a>
                <a th:href="@{/institute-admin/trainers}" 
                   class="group flex items-center px-2 py-2 text-sm font-medium rounded-md text-gray-600 hover:bg-gray-50 hover:text-gray-900">
                    <i class="fas fa-users-cog mr-3 text-lg"></i>
                    훈련사 관리
                </a>
                <a th:href="@{/institute-admin/courses}" 
                   class="group flex items-center px-2 py-2 text-sm font-medium rounded-md text-gray-600 hover:bg-gray-50 hover:text-gray-900">
                    <i class="fas fa-book-open mr-3 text-lg"></i>
                    강좌 관리
                </a>
            </div>

            <!-- Admin Features (if user is admin) -->
            <div th:if="${user?.role == 'ADMIN'}" class="space-y-1">
                <h3 class="px-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">
                    시스템 관리
                </h3>
                <a th:href="@{/admin/dashboard}" 
                   class="group flex items-center px-2 py-2 text-sm font-medium rounded-md text-gray-600 hover:bg-gray-50 hover:text-gray-900">
                    <i class="fas fa-shield-alt mr-3 text-lg"></i>
                    관리자 대시보드
                </a>
                <a th:href="@{/admin/users}" 
                   class="group flex items-center px-2 py-2 text-sm font-medium rounded-md text-gray-600 hover:bg-gray-50 hover:text-gray-900">
                    <i class="fas fa-users mr-3 text-lg"></i>
                    사용자 관리
                </a>
                <a th:href="@{/admin/institutes}" 
                   class="group flex items-center px-2 py-2 text-sm font-medium rounded-md text-gray-600 hover:bg-gray-50 hover:text-gray-900">
                    <i class="fas fa-building mr-3 text-lg"></i>
                    기관 관리
                </a>
                <a th:href="@{/admin/settlement}" 
                   class="group flex items-center px-2 py-2 text-sm font-medium rounded-md text-gray-600 hover:bg-gray-50 hover:text-gray-900">
                    <i class="fas fa-calculator mr-3 text-lg"></i>
                    정산 관리
                </a>
            </div>
        </nav>
    </aside>

    <!-- Mobile sidebar overlay -->
    <div x-show="sidebarOpen" 
         @click="sidebarOpen = false"
         class="lg:hidden fixed inset-0 z-30 bg-gray-600 bg-opacity-50"></div>
</body>
</html>
