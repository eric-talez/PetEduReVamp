<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- 챗봇 프래그먼트 -->
    <div th:fragment="chatbot" class="chatbot-container">
        <button class="chatbot-button">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            <span id="unread-badge" class="unread-badge" style="display: none;">1</span>
        </button>
        
        <div class="chatbot-window">
            <div class="chatbot-header">
                <div class="chatbot-title">테일즈 쇼핑 고객센터</div>
                <button class="chatbot-close">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            
            <div class="chatbot-messages">
                <div class="message bot-message">
                    안녕하세요! 테일즈 쇼핑 챗봇입니다. 무엇을 도와드릴까요?
                    <div class="message-time">09:00</div>
                </div>
                
                <div id="chatbot-suggestions" class="chatbot-suggestions">
                    <button class="suggestion-btn">상품 추천해주세요</button>
                    <button class="suggestion-btn">배송 조회는 어떻게 하나요?</button>
                    <button class="suggestion-btn">반품 정책이 궁금해요</button>
                    <button class="suggestion-btn">회원 가입 방법을 알려주세요</button>
                </div>
            </div>
            
            <div class="chatbot-input">
                <input type="text" id="chatbot-input" placeholder="메시지를 입력하세요...">
                <button class="chatbot-send">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</body>
</html>
