<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null ? pageTitle + ' - PetEdu Platform' : 'PetEdu Platform'}">PetEdu Platform</title>
    
    <!-- Meta Tags -->
    <meta name="description" th:content="${pageDescription ?: 'AI 기반 반려동물 훈련 플랫폼'}">
    <meta name="keywords" content="반려동물, 훈련, AI, 교육, 펫에듀">
    
    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/main.css}" rel="stylesheet">
    
    <!-- Additional CSS -->
    <th:block layout:fragment="css"></th:block>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navigation Header -->
    <nav th:replace="~{fragments/header :: header}"></nav>
    
    <!-- Sidebar -->
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
    
    <!-- Main Content -->
    <main class="lg:ml-64 pt-16">
        <div class="container mx-auto px-4 py-6">
            <!-- Breadcrumb -->
            <nav th:if="${breadcrumbs}" class="flex mb-4" aria-label="Breadcrumb">
                <ol class="inline-flex items-center space-x-1 md:space-x-3">
                    <li th:each="breadcrumb, iterStat : ${breadcrumbs}" class="inline-flex items-center">
                        <a th:if="${!iterStat.last}" 
                           th:href="@{${breadcrumb.url}}"
                           th:text="${breadcrumb.name}"
                           class="inline-flex items-center text-sm font-medium text-gray-700 hover:text-blue-600">
                        </a>
                        <span th:if="${iterStat.last}" 
                              th:text="${breadcrumb.name}"
                              class="ml-1 text-sm font-medium text-gray-500 md:ml-2">
                        </span>
                        <svg th:if="${!iterStat.last}" class="w-6 h-6 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path>
                        </svg>
                    </li>
                </ol>
            </nav>
            
            <!-- Page Content -->
            <div layout:fragment="content">
                <!-- Default content -->
            </div>
        </div>
    </main>
    
    <!-- Footer -->
    <footer th:replace="~{fragments/footer :: footer}"></footer>
    
    <!-- JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script th:src="@{/js/main.js}"></script>
    
    <!-- Additional JavaScript -->
    <th:block layout:fragment="scripts"></th:block>
</body>
</html>
