<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="fragments/layout :: layout(~{::title}, ~{::main})">
<head>
    <title th:text="${category.name} + ' - 테일즈 쇼핑'">카테고리 - 테일즈 쇼핑</title>
</head>
<body>
    <main>
        <div class="container">
            <div class="category-detail-container">
                <!-- 카테고리 헤더 -->
                <div class="category-header">
                    <h1 class="category-title" th:text="${category.name}">카테고리 이름</h1>
                    <p class="category-description" th:if="${category.description}" th:text="${category.description}">
                        카테고리 설명이 여기에 표시됩니다.
                    </p>
                </div>
                
                <!-- 필터링 사이드바와 상품 목록 컨테이너 -->
                <div class="category-content">
                    <!-- 필터링 사이드바 -->
                    <div class="filter-sidebar">
                        <div class="filter-section">
                            <div class="filter-header" onclick="toggleFilter('category-filter')">
                                <h3 class="filter-title">카테고리</h3>
                                <span class="filter-toggle">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <polyline points="6 9 12 15 18 9"></polyline>
                                    </svg>
                                </span>
                            </div>
                            <div id="category-filter" class="filter-content">
                                <ul class="filter-list">
                                    <li th:each="cat : ${categories}" class="filter-item">
                                        <a th:href="@{'/shop/category/' + ${cat.name}}" th:classappend="${category.name == cat.name ? 'active' : ''}">
                                            <span th:text="${cat.name}">카테고리 이름</span>
                                            <span class="filter-count" th:text="${cat.productCount}">0</span>
                                        </a>
                                    </li>
                                </ul>
                            </div>
                        </div>
                        
                        <div class="filter-section">
                            <div class="filter-header" onclick="toggleFilter('price-filter')">
                                <h3 class="filter-title">가격</h3>
                                <span class="filter-toggle">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <polyline points="6 9 12 15 18 9"></polyline>
                                    </svg>
                                </span>
                            </div>
                            <div id="price-filter" class="filter-content">
                                <div class="price-range">
                                    <input type="range" id="price-range-input" min="0" max="200000" step="5000" value="50000">
                                    <div class="price-inputs">
                                        <div class="price-input">
                                            <label for="min-price">최소</label>
                                            <input type="number" id="min-price" value="0" min="0">
                                        </div>
                                        <div class="price-input">
                                            <label for="max-price">최대</label>
                                            <input type="number" id="max-price" value="50000" min="0">
                                        </div>
                                    </div>
                                    <button class="apply-price-filter">적용</button>
                                </div>
                            </div>
                        </div>
                        
                        <div class="filter-section">
                            <div class="filter-header" onclick="toggleFilter('brand-filter')">
                                <h3 class="filter-title">브랜드</h3>
                                <span class="filter-toggle">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <polyline points="6 9 12 15 18 9"></polyline>
                                    </svg>
                                </span>
                            </div>
                            <div id="brand-filter" class="filter-content">
                                <div class="filter-search">
                                    <input type="text" placeholder="브랜드 검색" class="filter-search-input">
                                </div>
                                <ul class="filter-list">
                                    <li class="filter-item">
                                        <label class="checkbox-label">
                                            <input type="checkbox" name="brand" value="테일즈">
                                            <span>테일즈</span>
                                            <span class="filter-count">5</span>
                                        </label>
                                    </li>
                                    <li class="filter-item">
                                        <label class="checkbox-label">
                                            <input type="checkbox" name="brand" value="내추럴코어">
                                            <span>내추럴코어</span>
                                            <span class="filter-count">8</span>
                                        </label>
                                    </li>
                                    <li class="filter-item">
                                        <label class="checkbox-label">
                                            <input type="checkbox" name="brand" value="펫테크">
                                            <span>펫테크</span>
                                            <span class="filter-count">3</span>
                                        </label>
                                    </li>
                                    <li class="filter-item">
                                        <label class="checkbox-label">
                                            <input type="checkbox" name="brand" value="애니홈">
                                            <span>애니홈</span>
                                            <span class="filter-count">6</span>
                                        </label>
                                    </li>
                                    <li class="filter-item">
                                        <label class="checkbox-label">
                                            <input type="checkbox" name="brand" value="캣랜드">
                                            <span>캣랜드</span>
                                            <span class="filter-count">4</span>
                                        </label>
                                    </li>
                                </ul>
                            </div>
                        </div>
                        
                        <div class="filter-section">
                            <div class="filter-header" onclick="toggleFilter('option-filter')">
                                <h3 class="filter-title">옵션</h3>
                                <span class="filter-toggle">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <polyline points="6 9 12 15 18 9"></polyline>
                                    </svg>
                                </span>
                            </div>
                            <div id="option-filter" class="filter-content">
                                <ul class="filter-list">
                                    <li class="filter-item">
                                        <label class="checkbox-label">
                                            <input type="checkbox" name="option" value="bestseller">
                                            <span>베스트셀러</span>
                                        </label>
                                    </li>
                                    <li class="filter-item">
                                        <label class="checkbox-label">
                                            <input type="checkbox" name="option" value="new">
                                            <span>신상품</span>
                                        </label>
                                    </li>
                                    <li class="filter-item">
                                        <label class="checkbox-label">
                                            <input type="checkbox" name="option" value="discount">
                                            <span>할인상품</span>
                                        </label>
                                    </li>
                                    <li class="filter-item">
                                        <label class="checkbox-label">
                                            <input type="checkbox" name="option" value="educational">
                                            <span>교육 연계 상품</span>
                                        </label>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 상품 목록 및 정렬 옵션 -->
                    <div class="product-container">
                        <!-- 정렬 옵션 -->
                        <div class="sorting-options">
                            <div class="product-count" th:text="${products.size()} + '개 상품'">0개 상품</div>
                            <div class="sort-controls">
                                <label for="category-sort">정렬</label>
                                <select id="category-sort" class="sort-select">
                                    <option value="popular">인기순</option>
                                    <option value="recent">최신순</option>
                                    <option value="price-low">가격 낮은순</option>
                                    <option value="price-high">가격 높은순</option>
                                    <option value="review">리뷰 많은순</option>
                                </select>
                            </div>
                        </div>
                        
                        <!-- 상품 목록 그리드 -->
                        <div class="product-grid">
                            <div th:each="product : ${products}" th:onclick="'goToProductDetail(' + ${product.id} + ')'" class="product-card">
                                <div class="product-image">
                                    <img th:src="${product.mainImage}" th:alt="${product.name}">
                                    <div th:if="${product.discountRate > 0}" class="product-badge" th:text="${product.discountRate} + '%'">30%</div>
                                </div>
                                <div class="product-content">
                                    <div class="product-brand" th:text="${product.brand}">브랜드명</div>
                                    <div class="product-title" th:text="${product.name}">상품명</div>
                                    <div class="product-price">
                                        <div th:if="${product.discountRate > 0}" class="product-discount" th:text="${product.discountRate} + '%'">30%</div>
                                        <div class="product-current" th:text="${#numbers.formatInteger(product.price, 0, 'COMMA') + '원'}">29,800원</div>
                                        <div th:if="${product.discountRate > 0}" class="product-original" th:text="${#numbers.formatInteger(product.originalPrice, 0, 'COMMA') + '원'}">38,000원</div>
                                    </div>
                                    <div class="product-rating">
                                        <div class="product-stars">
                                            <span th:each="i : ${#numbers.sequence(1, 5)}">
                                                <svg th:if="${i <= product.rating}" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                                                </svg>
                                                <svg th:unless="${i <= product.rating}" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                                                </svg>
                                            </span>
                                        </div>
                                        <span th:text="'리뷰 ' + ${product.reviewCount}">리뷰 128개</span>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- 상품이 없는 경우 -->
                            <div th:if="${#lists.isEmpty(products)}" class="no-products">
                                <div class="no-products-icon">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <circle cx="9" cy="21" r="1"></circle>
                                        <circle cx="20" cy="21" r="1"></circle>
                                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                                    </svg>
                                </div>
                                <h3 class="no-products-title">상품이 없습니다</h3>
                                <p class="no-products-text">
                                    아직 이 카테고리에 등록된 상품이 없습니다.<br>
                                    다른 카테고리를 확인해보세요.
                                </p>
                                <a th:href="@{/shop}" class="no-products-button">쇼핑 계속하기</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <script>
        // 필터 토글 함수
        function toggleFilter(filterId) {
            const filterContent = document.getElementById(filterId);
            filterContent.classList.toggle('active');
            
            const filterHeader = filterContent.previousElementSibling;
            const filterToggle = filterHeader.querySelector('.filter-toggle');
            filterToggle.classList.toggle('open');
        }
        
        // 초기화 함수
        document.addEventListener('DOMContentLoaded', function() {
            // 모든 필터를 기본적으로 열린 상태로 설정
            const filterContents = document.querySelectorAll('.filter-content');
            filterContents.forEach(content => {
                content.classList.add('active');
                
                const filterHeader = content.previousElementSibling;
                const filterToggle = filterHeader.querySelector('.filter-toggle');
                filterToggle.classList.add('open');
            });
            
            // 가격 범위 슬라이더 설정
            const priceRangeInput = document.getElementById('price-range-input');
            const maxPriceInput = document.getElementById('max-price');
            
            if (priceRangeInput && maxPriceInput) {
                priceRangeInput.addEventListener('input', function() {
                    maxPriceInput.value = this.value;
                });
                
                maxPriceInput.addEventListener('input', function() {
                    priceRangeInput.value = this.value;
                });
            }
        });
    </script>
    
    <style>
        .category-detail-container {
            margin: 2rem 0 4rem 0;
        }
        
        .category-header {
            margin-bottom: 2rem;
        }
        
        .category-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-color);
        }
        
        .dark-mode .category-title {
            color: var(--gray-100);
        }
        
        .category-description {
            font-size: 1rem;
            color: var(--gray-600);
            line-height: 1.6;
        }
        
        .dark-mode .category-description {
            color: var(--gray-400);
        }
        
        .category-content {
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 2rem;
        }
        
        @media (max-width: 768px) {
            .category-content {
                grid-template-columns: 1fr;
            }
        }
        
        .filter-sidebar {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .filter-section {
            border: 1px solid var(--gray-200);
            border-radius: 0.5rem;
            overflow: hidden;
        }
        
        .dark-mode .filter-section {
            border-color: var(--gray-700);
        }
        
        .filter-header {
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            background-color: var(--gray-50);
            border-bottom: 1px solid var(--gray-200);
        }
        
        .dark-mode .filter-header {
            background-color: var(--gray-800);
            border-color: var(--gray-700);
        }
        
        .filter-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-color);
            margin: 0;
        }
        
        .dark-mode .filter-title {
            color: var(--gray-200);
        }
        
        .filter-toggle {
            color: var(--gray-500);
            transition: transform 0.2s;
        }
        
        .dark-mode .filter-toggle {
            color: var(--gray-400);
        }
        
        .filter-toggle.open {
            transform: rotate(180deg);
        }
        
        .filter-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        
        .filter-content.active {
            max-height: 500px;
        }
        
        .filter-list {
            list-style: none;
            padding: 1rem;
            margin: 0;
        }
        
        .filter-item {
            margin-bottom: 0.75rem;
        }
        
        .filter-item:last-child {
            margin-bottom: 0;
        }
        
        .filter-item a {
            display: flex;
            justify-content: space-between;
            color: var(--text-color);
            padding: 0.25rem 0;
            transition: color 0.2s;
        }
        
        .dark-mode .filter-item a {
            color: var(--gray-300);
        }
        
        .filter-item a:hover, 
        .filter-item a.active {
            color: var(--primary-color);
        }
        
        .filter-count {
            color: var(--gray-500);
            font-size: 0.875rem;
        }
        
        .dark-mode .filter-count {
            color: var(--gray-500);
        }
        
        .checkbox-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            color: var(--text-color);
        }
        
        .dark-mode .checkbox-label {
            color: var(--gray-300);
        }
        
        .checkbox-label input {
            margin-right: 0.5rem;
        }
        
        .checkbox-label .filter-count {
            margin-left: auto;
        }
        
        .filter-search {
            padding: 1rem 1rem 0.5rem;
        }
        
        .filter-search-input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--gray-300);
            border-radius: 0.25rem;
            font-size: 0.875rem;
            background-color: white;
            color: var(--text-color);
        }
        
        .dark-mode .filter-search-input {
            background-color: var(--gray-800);
            border-color: var(--gray-600);
            color: var(--gray-300);
        }
        
        .price-range {
            padding: 1rem;
        }
        
        .price-range input[type="range"] {
            width: 100%;
            margin-bottom: 1rem;
        }
        
        .price-inputs {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .price-input {
            flex: 1;
        }
        
        .price-input label {
            display: block;
            font-size: 0.75rem;
            margin-bottom: 0.25rem;
            color: var(--gray-600);
        }
        
        .dark-mode .price-input label {
            color: var(--gray-400);
        }
        
        .price-input input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--gray-300);
            border-radius: 0.25rem;
            font-size: 0.875rem;
            background-color: white;
            color: var(--text-color);
        }
        
        .dark-mode .price-input input {
            background-color: var(--gray-800);
            border-color: var(--gray-600);
            color: var(--gray-300);
        }
        
        .apply-price-filter {
            width: 100%;
            padding: 0.5rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.25rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .apply-price-filter:hover {
            background-color: var(--primary-hover);
        }
        
        .product-container {
            display: flex;
            flex-direction: column;
        }
        
        .sorting-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid var(--gray-200);
            margin-bottom: 2rem;
        }
        
        .dark-mode .sorting-options {
            border-color: var(--gray-700);
        }
        
        .product-count {
            font-size: 0.875rem;
            color: var(--gray-600);
        }
        
        .dark-mode .product-count {
            color: var(--gray-400);
        }
        
        .sort-controls {
            display: flex;
            align-items: center;
        }
        
        .sort-controls label {
            margin-right: 0.5rem;
            font-size: 0.875rem;
            color: var(--gray-700);
        }
        
        .dark-mode .sort-controls label {
            color: var(--gray-400);
        }
        
        .sort-select {
            padding: 0.5rem;
            border: 1px solid var(--gray-300);
            border-radius: 0.25rem;
            font-size: 0.875rem;
            background-color: white;
            color: var(--text-color);
        }
        
        .dark-mode .sort-select {
            background-color: var(--gray-800);
            border-color: var(--gray-600);
            color: var(--gray-300);
        }
        
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
        }
        
        .no-products {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 0;
            text-align: center;
        }
        
        .no-products-icon {
            color: var(--gray-400);
            margin-bottom: 1.5rem;
        }
        
        .dark-mode .no-products-icon {
            color: var(--gray-600);
        }
        
        .no-products-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-color);
        }
        
        .dark-mode .no-products-title {
            color: var(--gray-200);
        }
        
        .no-products-text {
            font-size: 1rem;
            color: var(--gray-600);
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        
        .dark-mode .no-products-text {
            color: var(--gray-400);
        }
        
        .no-products-button {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background-color: var(--primary-color);
            color: white;
            font-weight: 500;
            border-radius: 0.25rem;
            transition: background-color 0.2s;
        }
        
        .no-products-button:hover {
            background-color: var(--primary-hover);
        }
    </style>
</body>
</html>
