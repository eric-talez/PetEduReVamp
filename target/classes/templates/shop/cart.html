<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="fragments/layout :: layout(~{::title}, ~{::main})">
<head>
    <title>장바구니 - 테일즈 쇼핑</title>
</head>
<body>
    <main>
        <div class="container">
            <div class="cart-container">
                <h1 class="cart-title">장바구니</h1>
                
                <!-- 장바구니가 비어있는 경우 -->
                <div th:if="${#lists.isEmpty(cartItems)}" class="empty-cart">
                    <div class="empty-cart-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg>
                    </div>
                    <h2 class="empty-cart-title">장바구니가 비어있습니다</h2>
                    <p class="empty-cart-text">마음에 드는 상품을 장바구니에 담아보세요!</p>
                    <a th:href="@{/shop}" class="empty-cart-button">쇼핑 계속하기</a>
                </div>
                
                <!-- 장바구니 상품이 있는 경우 -->
                <div th:unless="${#lists.isEmpty(cartItems)}" class="cart-content">
                    <!-- 장바구니 헤더 -->
                    <div class="cart-header">
                        <div class="cart-header-item check">
                            <label class="checkbox-label">
                                <input type="checkbox" id="select-all" checked>
                                <span>전체선택</span>
                            </label>
                        </div>
                        <div class="cart-header-item product">상품정보</div>
                        <div class="cart-header-item quantity">수량</div>
                        <div class="cart-header-item price">가격</div>
                        <div class="cart-header-item delivery">배송비</div>
                        <div class="cart-header-item action">선택</div>
                    </div>
                    
                    <!-- 장바구니 상품 목록 -->
                    <div class="cart-items">
                        <div th:each="item : ${cartItems}" class="cart-item">
                            <div class="cart-item-check">
                                <input type="checkbox" class="item-checkbox" th:value="${item.productId}" checked>
                            </div>
                            <div class="cart-item-product">
                                <div class="item-image">
                                    <img th:src="${item.image}" th:alt="${item.name}">
                                </div>
                                <div class="item-info">
                                    <div class="item-name" th:text="${item.name}">상품명</div>
                                    <div class="item-price" th:text="${#numbers.formatInteger(item.price, 0, 'COMMA') + '원'}">가격</div>
                                </div>
                            </div>
                            <div class="cart-item-quantity">
                                <div class="quantity-selector">
                                    <button type="button" th:onclick="'decrementQuantity(this, ' + ${item.productId} + ')'" class="quantity-btn">-</button>
                                    <input type="number" th:value="${item.quantity}" min="1" class="quantity-input" th:onchange="'updateQuantity(this, ' + ${item.productId} + ')'">
                                    <button type="button" th:onclick="'incrementQuantity(this, ' + ${item.productId} + ')'" class="quantity-btn">+</button>
                                </div>
                            </div>
                            <div class="cart-item-total-price" th:text="${#numbers.formatInteger(item.price * item.quantity, 0, 'COMMA') + '원'}">총 가격</div>
                            <div class="cart-item-delivery">무료배송</div>
                            <div class="cart-item-action">
                                <button type="button" th:onclick="'removeFromCart(' + ${item.productId} + ')'" class="remove-button">삭제</button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 장바구니 하단 -->
                    <div class="cart-bottom">
                        <div class="selected-actions">
                            <button type="button" id="delete-selected" class="selected-action-button">선택 삭제</button>
                            <button type="button" id="clear-cart" class="selected-action-button">장바구니 비우기</button>
                        </div>
                    </div>
                    
                    <!-- 주문 요약 -->
                    <div class="order-summary">
                        <div class="summary-item">
                            <span class="summary-label">상품 금액</span>
                            <span class="summary-value" id="products-total" th:text="${#numbers.formatInteger(totalPrice, 0, 'COMMA') + '원'}">0원</span>
                        </div>
                        <div class="summary-item">
                            <span class="summary-label">배송비</span>
                            <span class="summary-value" id="delivery-fee">무료</span>
                        </div>
                        <div class="summary-divider"></div>
                        <div class="summary-item total">
                            <span class="summary-label">결제 예정 금액</span>
                            <span class="summary-value" id="final-total" th:text="${#numbers.formatInteger(totalPrice, 0, 'COMMA') + '원'}">0원</span>
                        </div>
                        <button type="button" id="checkout-button" class="checkout-button">주문하기</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <script th:inline="javascript">
        // 전체 선택 처리
        document.addEventListener('DOMContentLoaded', function() {
            const selectAllCheckbox = document.getElementById('select-all');
            const itemCheckboxes = document.querySelectorAll('.item-checkbox');
            
            if (selectAllCheckbox) {
                selectAllCheckbox.addEventListener('change', function() {
                    const isChecked = this.checked;
                    itemCheckboxes.forEach(checkbox => {
                        checkbox.checked = isChecked;
                    });
                    updateSummary();
                });
            }
            
            if (itemCheckboxes.length > 0) {
                itemCheckboxes.forEach(checkbox => {
                    checkbox.addEventListener('change', function() {
                        // 모든 체크박스가 체크되었는지 확인
                        const allChecked = [...itemCheckboxes].every(cb => cb.checked);
                        if (selectAllCheckbox) {
                            selectAllCheckbox.checked = allChecked;
                        }
                        updateSummary();
                    });
                });
            }
            
            // 선택 삭제 버튼
            const deleteSelectedButton = document.getElementById('delete-selected');
            if (deleteSelectedButton) {
                deleteSelectedButton.addEventListener('click', function() {
                    const selectedItems = [...document.querySelectorAll('.item-checkbox:checked')].map(cb => cb.value);
                    if (selectedItems.length === 0) {
                        alert('삭제할 상품을 선택해주세요.');
                        return;
                    }
                    
                    if (confirm('선택한 상품을 장바구니에서 삭제하시겠습니까?')) {
                        // 선택된 상품 순차적으로 삭제
                        selectedItems.forEach(productId => {
                            removeFromCart(productId);
                        });
                    }
                });
            }
            
            // 장바구니 비우기 버튼
            const clearCartButton = document.getElementById('clear-cart');
            if (clearCartButton) {
                clearCartButton.addEventListener('click', function() {
                    if (confirm('장바구니를 비우시겠습니까?')) {
                        clearCart();
                    }
                });
            }
            
            // 주문하기 버튼
            const checkoutButton = document.getElementById('checkout-button');
            if (checkoutButton) {
                checkoutButton.addEventListener('click', function() {
                    const selectedItems = [...document.querySelectorAll('.item-checkbox:checked')].map(cb => cb.value);
                    if (selectedItems.length === 0) {
                        alert('주문할 상품을 선택해주세요.');
                        return;
                    }
                    
                    // 주문 페이지로 이동
                    const selectedItemsParam = selectedItems.join(',');
                    window.location.href = `/shop/checkout?items=${selectedItemsParam}`;
                });
            }
        });
        
        // 수량 증가 함수
        function incrementQuantity(button, productId) {
            const input = button.parentNode.querySelector('.quantity-input');
            let value = parseInt(input.value);
            input.value = ++value;
            updateQuantity(input, productId);
        }
        
        // 수량 감소 함수
        function decrementQuantity(button, productId) {
            const input = button.parentNode.querySelector('.quantity-input');
            let value = parseInt(input.value);
            if (value > 1) {
                input.value = --value;
                updateQuantity(input, productId);
            }
        }
        
        // 수량 업데이트 함수
        function updateQuantity(input, productId) {
            const quantity = parseInt(input.value);
            if (isNaN(quantity) || quantity < 1) {
                input.value = 1;
                return;
            }
            
            // AJAX 요청으로 수량 업데이트
            fetch(`/cart/update?productId=${productId}&quantity=${quantity}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // 장바구니 정보 업데이트
                    updateCartView();
                } else {
                    console.error('수량 업데이트 실패:', data.message);
                    alert(data.message || '수량 업데이트 중 오류가 발생했습니다.');
                }
            })
            .catch(error => {
                console.error('수량 업데이트 중 오류:', error);
                alert('수량 업데이트 중 오류가 발생했습니다.');
            });
        }
        
        // 장바구니에서 삭제 함수
        function removeFromCart(productId) {
            // AJAX 요청으로 상품 삭제
            fetch(`/cart/remove?productId=${productId}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // 화면 새로고침으로 장바구니 업데이트
                    window.location.reload();
                } else {
                    console.error('상품 삭제 실패:', data.message);
                    alert(data.message || '상품 삭제 중 오류가 발생했습니다.');
                }
            })
            .catch(error => {
                console.error('상품 삭제 중 오류:', error);
                alert('상품 삭제 중 오류가 발생했습니다.');
            });
        }
        
        // 장바구니 비우기 함수
        function clearCart() {
            // AJAX 요청으로 장바구니 비우기
            fetch('/cart/clear', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // 화면 새로고침으로 장바구니 업데이트
                    window.location.reload();
                } else {
                    console.error('장바구니 비우기 실패:', data.message);
                    alert(data.message || '장바구니 비우기 중 오류가 발생했습니다.');
                }
            })
            .catch(error => {
                console.error('장바구니 비우기 중 오류:', error);
                alert('장바구니 비우기 중 오류가 발생했습니다.');
            });
        }
        
        // 장바구니 화면 업데이트 함수
        function updateCartView() {
            window.location.reload();
        }
        
        // 주문 요약 업데이트 함수
        function updateSummary() {
            // 선택된 상품 가격 계산
            let totalPrice = 0;
            const selectedItems = document.querySelectorAll('.item-checkbox:checked');
            
            selectedItems.forEach(checkbox => {
                const productId = checkbox.value;
                const cartItem = document.querySelector(`.cart-item input[value="${productId}"]`).closest('.cart-item');
                const priceText = cartItem.querySelector('.cart-item-total-price').textContent;
                const price = parseInt(priceText.replace(/[^0-9]/g, ''));
                totalPrice += price;
            });
            
            // 총 가격 업데이트
            document.getElementById('products-total').textContent = numberWithCommas(totalPrice) + '원';
            document.getElementById('final-total').textContent = numberWithCommas(totalPrice) + '원';
        }
        
        // 숫자 형식화 함수
        function numberWithCommas(x) {
            return x.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }
    </script>
    
    <style>
        .cart-container {
            margin: 2rem 0 4rem 0;
        }
        
        .cart-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: var(--text-color);
        }
        
        .dark-mode .cart-title {
            color: var(--gray-100);
        }
        
        .empty-cart {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 0;
            text-align: center;
        }
        
        .empty-cart-icon {
            color: var(--gray-400);
            margin-bottom: 1.5rem;
        }
        
        .dark-mode .empty-cart-icon {
            color: var(--gray-600);
        }
        
        .empty-cart-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-color);
        }
        
        .dark-mode .empty-cart-title {
            color: var(--gray-200);
        }
        
        .empty-cart-text {
            font-size: 1rem;
            color: var(--gray-600);
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        
        .dark-mode .empty-cart-text {
            color: var(--gray-400);
        }
        
        .empty-cart-button {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background-color: var(--primary-color);
            color: white;
            font-weight: 500;
            border-radius: 0.25rem;
            transition: background-color 0.2s;
        }
        
        .empty-cart-button:hover {
            background-color: var(--primary-hover);
        }
        
        .cart-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }
        
        .cart-header {
            display: grid;
            grid-template-columns: 80px 2fr 1fr 1fr 1fr 80px;
            align-items: center;
            padding: 1rem 0;
            border-top: 2px solid var(--text-color);
            border-bottom: 1px solid var(--gray-300);
            color: var(--text-color);
            font-weight: 600;
        }
        
        .dark-mode .cart-header {
            border-top-color: var(--gray-200);
            border-bottom-color: var(--gray-700);
            color: var(--gray-300);
        }
        
        .cart-header-item {
            text-align: center;
        }
        
        .cart-header-item.product {
            text-align: left;
            padding-left: 1rem;
        }
        
        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .cart-item {
            display: grid;
            grid-template-columns: 80px 2fr 1fr 1fr 1fr 80px;
            align-items: center;
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--gray-200);
        }
        
        .dark-mode .cart-item {
            border-bottom-color: var(--gray-700);
        }
        
        .cart-item-check {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .cart-item-product {
            display: flex;
            align-items: center;
        }
        
        .item-image {
            width: 80px;
            height: 80px;
            border-radius: 0.25rem;
            overflow: hidden;
            margin-right: 1rem;
        }
        
        .item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .item-info {
            flex: 1;
        }
        
        .item-name {
            font-weight: 500;
            color: var(--text-color);
            margin-bottom: 0.5rem;
        }
        
        .dark-mode .item-name {
            color: var(--gray-300);
        }
        
        .item-price {
            font-size: 0.875rem;
            color: var(--gray-600);
        }
        
        .dark-mode .item-price {
            color: var(--gray-400);
        }
        
        .cart-item-quantity {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .quantity-selector {
            display: flex;
            align-items: center;
        }
        
        .quantity-btn {
            width: 2rem;
            height: 2rem;
            border: 1px solid var(--gray-300);
            background-color: white;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
        }
        
        .dark-mode .quantity-btn {
            background-color: var(--gray-800);
            border-color: var(--gray-600);
            color: var(--gray-300);
        }
        
        .quantity-input {
            width: 3rem;
            height: 2rem;
            border-top: 1px solid var(--gray-300);
            border-bottom: 1px solid var(--gray-300);
            border-left: none;
            border-right: none;
            text-align: center;
            font-size: 0.875rem;
            background-color: white;
            color: var(--text-color);
        }
        
        .dark-mode .quantity-input {
            background-color: var(--gray-800);
            border-color: var(--gray-600);
            color: var(--gray-300);
        }
        
        .cart-item-total-price {
            text-align: center;
            font-weight: 600;
            color: var(--text-color);
        }
        
        .dark-mode .cart-item-total-price {
            color: var(--gray-300);
        }
        
        .cart-item-delivery {
            text-align: center;
            color: var(--gray-600);
            font-size: 0.875rem;
        }
        
        .dark-mode .cart-item-delivery {
            color: var(--gray-400);
        }
        
        .cart-item-action {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .remove-button {
            padding: 0.5rem 1rem;
            background-color: transparent;
            border: 1px solid var(--gray-300);
            color: var(--gray-600);
            font-size: 0.875rem;
            border-radius: 0.25rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .dark-mode .remove-button {
            border-color: var(--gray-600);
            color: var(--gray-400);
        }
        
        .remove-button:hover {
            background-color: var(--gray-100);
            color: var(--text-color);
        }
        
        .dark-mode .remove-button:hover {
            background-color: var(--gray-700);
            color: var(--gray-300);
        }
        
        .cart-bottom {
            padding: 1rem 0;
            border-bottom: 1px solid var(--gray-200);
        }
        
        .dark-mode .cart-bottom {
            border-bottom-color: var(--gray-700);
        }
        
        .selected-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .selected-action-button {
            padding: 0.5rem 1rem;
            background-color: transparent;
            border: 1px solid var(--gray-300);
            color: var(--gray-600);
            font-size: 0.875rem;
            border-radius: 0.25rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .dark-mode .selected-action-button {
            border-color: var(--gray-600);
            color: var(--gray-400);
        }
        
        .selected-action-button:hover {
            background-color: var(--gray-100);
            color: var(--text-color);
        }
        
        .dark-mode .selected-action-button:hover {
            background-color: var(--gray-700);
            color: var(--gray-300);
        }
        
        .order-summary {
            padding: 2rem;
            border: 1px solid var(--gray-200);
            border-radius: 0.5rem;
            background-color: var(--gray-50);
        }
        
        .dark-mode .order-summary {
            border-color: var(--gray-700);
            background-color: var(--gray-800);
        }
        
        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            color: var(--gray-700);
        }
        
        .dark-mode .summary-item {
            color: var(--gray-300);
        }
        
        .summary-item.total {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-color);
        }
        
        .dark-mode .summary-item.total {
            color: var(--gray-100);
        }
        
        .summary-divider {
            border-top: 1px solid var(--gray-300);
            margin: 1.5rem 0;
        }
        
        .dark-mode .summary-divider {
            border-color: var(--gray-600);
        }
        
        .checkout-button {
            width: 100%;
            padding: 1rem;
            margin-top: 1.5rem;
            background-color: var(--primary-color);
            color: white;
            font-size: 1.125rem;
            font-weight: 600;
            border: none;
            border-radius: 0.25rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .checkout-button:hover {
            background-color: var(--primary-hover);
        }
        
        .checkbox-label {
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        
        .checkbox-label input {
            margin-right: 0.5rem;
        }
        
        @media (max-width: 768px) {
            .cart-header, .cart-item {
                grid-template-columns: 60px 3fr 1fr 1fr;
            }
            
            .cart-header-item.delivery, .cart-item-delivery {
                display: none;
            }
            
            .cart-header-item.action, .cart-item-action {
                display: none;
            }
        }
    </style>
</body>
</html>
