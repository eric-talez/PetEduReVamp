<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">대시보드 - PetEdu Platform</title>
    <meta name="description" content="PetEdu 플랫폼 관리 대시보드">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/lucide.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/lucide.min.js"></script>
</head>
<body class="bg-gray-50">
    <!-- 헤더 -->
    <header class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <h1 class="text-2xl font-bold text-blue-600">PetEdu</h1>
                </div>
                <nav class="hidden md:flex space-x-8">
                    <a href="/" class="text-gray-700 hover:text-blue-600">홈</a>
                    <a href="/courses" class="text-gray-700 hover:text-blue-600">강좌</a>
                    <a href="/dashboard" class="text-blue-600 font-semibold">대시보드</a>
                </nav>
                <div class="flex items-center space-x-4">
                    <div class="text-sm text-gray-600">관리자</div>
                    <button class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700">로그아웃</button>
                </div>
            </div>
        </div>
    </header>

    <!-- 메인 콘텐츠 -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">관리 대시보드</h1>
            <p class="text-gray-600 mt-2">PetEdu 플랫폼 통계와 관리 기능</p>
        </div>

        <!-- 통계 카드 -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow-sm p-6 border border-gray-200">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <div class="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center">
                            <i data-lucide="users" class="w-5 h-5 text-blue-600"></i>
                        </div>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm font-medium text-gray-600">총 사용자</p>
                        <p class="text-2xl font-semibold text-gray-900">1,250</p>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow-sm p-6 border border-gray-200">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <div class="w-8 h-8 bg-green-100 rounded-lg flex items-center justify-center">
                            <i data-lucide="heart" class="w-5 h-5 text-green-600"></i>
                        </div>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm font-medium text-gray-600">등록 반려동물</p>
                        <p class="text-2xl font-semibold text-gray-900">3,400</p>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow-sm p-6 border border-gray-200">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <div class="w-8 h-8 bg-purple-100 rounded-lg flex items-center justify-center">
                            <i data-lucide="book-open" class="w-5 h-5 text-purple-600"></i>
                        </div>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm font-medium text-gray-600">활성 강좌</p>
                        <p class="text-2xl font-semibold text-gray-900">150</p>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow-sm p-6 border border-gray-200">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <div class="w-8 h-8 bg-orange-100 rounded-lg flex items-center justify-center">
                            <i data-lucide="award" class="w-5 h-5 text-orange-600"></i>
                        </div>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm font-medium text-gray-600">전문 훈련사</p>
                        <p class="text-2xl font-semibold text-gray-900">85</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 관리 메뉴 -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="bg-white rounded-lg shadow-sm p-6 border border-gray-200 hover:shadow-md transition-shadow">
                <div class="flex items-center justify-between">
                    <div>
                        <h3 class="text-lg font-semibold text-gray-900">사용자 관리</h3>
                        <p class="text-gray-600 mt-1">사용자 계정 및 권한 관리</p>
                    </div>
                    <i data-lucide="users" class="w-8 h-8 text-blue-600"></i>
                </div>
                <div class="mt-4">
                    <button class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition-colors">
                        관리하기
                    </button>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow-sm p-6 border border-gray-200 hover:shadow-md transition-shadow">
                <div class="flex items-center justify-between">
                    <div>
                        <h3 class="text-lg font-semibold text-gray-900">강좌 관리</h3>
                        <p class="text-gray-600 mt-1">교육 과정 및 콘텐츠 관리</p>
                    </div>
                    <i data-lucide="book-open" class="w-8 h-8 text-purple-600"></i>
                </div>
                <div class="mt-4">
                    <button class="w-full bg-purple-600 text-white py-2 rounded-lg hover:bg-purple-700 transition-colors">
                        관리하기
                    </button>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow-sm p-6 border border-gray-200 hover:shadow-md transition-shadow">
                <div class="flex items-center justify-between">
                    <div>
                        <h3 class="text-lg font-semibold text-gray-900">훈련사 관리</h3>
                        <p class="text-gray-600 mt-1">전문 훈련사 인증 및 관리</p>
                    </div>
                    <i data-lucide="award" class="w-8 h-8 text-orange-600"></i>
                </div>
                <div class="mt-4">
                    <button class="w-full bg-orange-600 text-white py-2 rounded-lg hover:bg-orange-700 transition-colors">
                        관리하기
                    </button>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow-sm p-6 border border-gray-200 hover:shadow-md transition-shadow">
                <div class="flex items-center justify-between">
                    <div>
                        <h3 class="text-lg font-semibold text-gray-900">반려동물 관리</h3>
                        <p class="text-gray-600 mt-1">등록된 반려동물 정보 관리</p>
                    </div>
                    <i data-lucide="heart" class="w-8 h-8 text-green-600"></i>
                </div>
                <div class="mt-4">
                    <button class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition-colors">
                        관리하기
                    </button>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow-sm p-6 border border-gray-200 hover:shadow-md transition-shadow">
                <div class="flex items-center justify-between">
                    <div>
                        <h3 class="text-lg font-semibold text-gray-900">시스템 설정</h3>
                        <p class="text-gray-600 mt-1">플랫폼 환경 설정 관리</p>
                    </div>
                    <i data-lucide="settings" class="w-8 h-8 text-gray-600"></i>
                </div>
                <div class="mt-4">
                    <button class="w-full bg-gray-600 text-white py-2 rounded-lg hover:bg-gray-700 transition-colors">
                        설정하기
                    </button>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow-sm p-6 border border-gray-200 hover:shadow-md transition-shadow">
                <div class="flex items-center justify-between">
                    <div>
                        <h3 class="text-lg font-semibold text-gray-900">리포트</h3>
                        <p class="text-gray-600 mt-1">통계 및 분석 리포트</p>
                    </div>
                    <i data-lucide="bar-chart-3" class="w-8 h-8 text-indigo-600"></i>
                </div>
                <div class="mt-4">
                    <button class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition-colors">
                        보기
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Lucide 아이콘 초기화
        lucide.createIcons();
    </script>
</body>
</html>
