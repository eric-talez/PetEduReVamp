<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="fragments/layout :: layout(~{::title}, ~{::main})">
<head>
    <title>오류 발생 - 테일즈 쇼핑</title>
</head>
<body>
    <main>
        <div class="container">
            <div class="error-container">
                <div class="error-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                </div>
                <h1 class="error-code" th:text="${status}">500</h1>
                <h2 class="error-title" th:text="${error}">서버 내부 오류</h2>
                <p class="error-message" th:text="${message}">요청을 처리하는 중 오류가 발생했습니다.</p>
                <div class="error-actions">
                    <a th:href="@{/shop}" class="error-button">쇼핑 계속하기</a>
                    <a th:href="@{/}" class="error-link">메인 서비스로 이동</a>
                </div>
            </div>
        </div>
    </main>
    
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4rem 1rem;
            min-height: 60vh;
        }
        
        .error-icon {
            margin-bottom: 2rem;
            color: var(--gray-400);
        }
        
        .dark-mode .error-icon {
            color: var(--gray-600);
        }
        
        .error-code {
            font-size: 5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 1rem;
            line-height: 1;
        }
        
        .error-title {
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 1rem;
        }
        
        .dark-mode .error-title {
            color: var(--gray-200);
        }
        
        .error-message {
            font-size: 1.125rem;
            color: var(--gray-600);
            max-width: 600px;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        
        .dark-mode .error-message {
            color: var(--gray-400);
        }
        
        .error-actions {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }
        
        .error-button {
            padding: 0.75rem 1.5rem;
            background-color: var(--primary-color);
            color: white;
            font-weight: 500;
            border-radius: 0.25rem;
            text-decoration: none;
            transition: background-color 0.2s;
        }
        
        .error-button:hover {
            background-color: var(--primary-hover);
        }
        
        .error-link {
            color: var(--primary-color);
            font-weight: 500;
            text-decoration: none;
        }
        
        .error-link:hover {
            text-decoration: underline;
        }
    </style>
</body>
</html>
