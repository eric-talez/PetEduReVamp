name: Build and Deploy to AWS EC2

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # Step 1: 빌드 테스트
  build-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_TOKEN }}
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Run build test
      run: |
        echo "🔨 빌드 테스트 시작..."
        npm run build
        echo "✅ 빌드 테스트 완료"

    - name: Run copy static files
      run: |
        chmod +x copy-static-files.sh
        ./copy-static-files.sh

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-files
        path: dist/
        retention-days: 1

  # Step 2: AWS 운영서버 배포
  deploy-production:
    needs: build-test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-files
        path: dist/

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Get GitHub Actions Runner IP
      id: get-ip
      run: |
        RUNNER_IP=$(curl -s https://ipinfo.io/ip)
        echo "runner-ip=$RUNNER_IP" >> $GITHUB_OUTPUT
        echo "🌐 GitHub Actions Runner IP: $RUNNER_IP"
    
    - name: Add SSH access to Security Group
      id: add-ssh-access
      run: |
        RUNNER_IP="${{ steps.get-ip.outputs.runner-ip }}"
        SECURITY_GROUP_ID="${{ secrets.SECURITY_GROUP_ID }}"
        
        echo "🔓 Adding SSH access for IP: $RUNNER_IP to Security Group: $SECURITY_GROUP_ID"
        
        # Add SSH access rule
        aws ec2 authorize-security-group-ingress \
          --group-id $SECURITY_GROUP_ID \
          --protocol tcp \
          --port 22 \
          --cidr "${RUNNER_IP}/32" \
          --output text
        
        echo "✅ SSH access granted successfully"
        echo "security-rule-added=true" >> $GITHUB_OUTPUT
    
    - name: Wait for security group update
      run: |
        echo "⏳ Waiting 10 seconds for security group update to propagate..."
        sleep 10

    - name: Deploy to AWS EC2 Production
      env:
        EC2_HOST: ${{ secrets.EC2_HOST }}
        EC2_USER: ${{ secrets.EC2_USER }}
        EC2_KEY: ${{ secrets.EC2_KEY }}
        SECURITY_GROUP_ID: ${{ secrets.SECURITY_GROUP_ID }}
        GH_USERNAME: ${{ secrets.GH_USERNAME }}
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        echo "🚀 AWS EC2 운영서버 배포 시작..."
        
        # SSH 디렉토리 생성
        mkdir -p ~/.ssh
        
        # EC2 키 파일 생성
        echo "$EC2_KEY" > /tmp/ec2_key.pem
        chmod 600 /tmp/ec2_key.pem
        
        # EC2에서 배포 실행 (환경변수 전달)
        ssh -i /tmp/ec2_key.pem \
          -o StrictHostKeyChecking=no \
          -o ConnectTimeout=30 \
          -o ServerAliveInterval=10 \
          -o ServerAliveCountMax=3 \
          $EC2_USER@$EC2_HOST << EOF
          
          set -e  # Exit on any error
          
          # Set GitHub credentials for private repository access
          export GH_USERNAME="${{ secrets.GH_USERNAME }}"
          export GH_TOKEN="${{ secrets.GH_TOKEN }}"
          
          echo "📦 운영서버 배포 시작..."
          echo "📍 Current working directory: \$(pwd)"
          echo "👤 Current user: \$(whoami)"
          echo "🔑 GitHub Username: \${GH_USERNAME}"
          echo "🔐 GitHub Token 설정됨: \$([ -n "\$GH_TOKEN" ] && echo "YES" || echo "NO")"
          
          # 홈 디렉토리의 funnytalez_www 폴더 처리
          if [ ! -d "\$HOME/funnytalez_www" ]; then
            echo "📁 Creating application directory..."
            mkdir -p \$HOME/funnytalez_www
            cd \$HOME/funnytalez_www
            echo "🔐 Cloning repository with authentication..."
            git clone https://\${GH_USERNAME}:\${GH_TOKEN}@github.com/\${GH_USERNAME}/PetEduRevampseupeuringbuteucoejong.git .
          else
            echo "📂 Application directory exists, navigating and updating..."
            cd \$HOME/funnytalez_www
            
            # Check if this is a git repository
            if [ ! -d ".git" ]; then
              echo "🔧 Directory exists but not a git repository, removing and cloning..."
              cd \$HOME
              rm -rf funnytalez_www
              mkdir -p funnytalez_www
              cd funnytalez_www
              git clone https://\${GH_USERNAME}:\${GH_TOKEN}@github.com/\${GH_USERNAME}/PetEduRevampseupeuringbuteucoejong.git .
            else
              echo "🔍 Existing git repository found, updating remote URL..."
              git remote set-url origin https://\${GH_USERNAME}:\${GH_TOKEN}@github.com/\${GH_USERNAME}/PetEduRevampseupeuringbuteucoejong.git
            fi
          fi
          
          echo "🔄 Pulling latest code from GitHub repository..."
          
          # Try multiple pull strategies
          if git pull origin main; then
            echo "✅ Successfully pulled from origin main"
          elif git pull https://\${GH_USERNAME}:\${GH_TOKEN}@github.com/\${GH_USERNAME}/PetEduRevampseupeuringbuteucoejong.git main; then
            echo "✅ Successfully pulled using full URL"
          else
            echo "⚠️ Standard pull failed, attempting force pull..."
            if git fetch origin main && git reset --hard origin/main; then
              echo "✅ Force pulled latest changes"
            else
              echo "🔄 All git operations failed, removing directory and re-cloning..."
              cd \$HOME
              rm -rf funnytalez_www
              mkdir -p funnytalez_www
              cd funnytalez_www
              git clone https://\${GH_USERNAME}:\${GH_TOKEN}@github.com/\${GH_USERNAME}/PetEduRevampseupeuringbuteucoejong.git .
              echo "✅ Fresh clone completed"
            fi
          fi
          
          # Verify we're in the right directory and show current status
          echo "📍 Current directory: \$(pwd)"
          echo "📁 Directory contents:"
          ls -la
          
          # Verify package.json exists
          if [ ! -f "package.json" ]; then
            echo "❌ package.json not found! Something went wrong with the git operations."
            exit 1
          fi
          
          # Install dependencies and build
          echo "📦 Installing dependencies..."
          npm install
          
          echo "🏗️ Building production assets..."
          npm run build
          
          echo "📂 Running copy static files..."
          ./copy-static-files.sh
          
          # Create backup of current production files
          BACKUP_TIMESTAMP=\$(date +"%Y%m%d%H%M%S")
          BACKUP_PATH="/var/www/backup/funnytalez_\${BACKUP_TIMESTAMP}.zip"
          
          echo "💾 Creating backup: \${BACKUP_PATH}"
          sudo mkdir -p /var/www/backup
          
          if [ -d "/var/www/funnytalez" ] && [ "\$(ls -A /var/www/funnytalez 2>/dev/null)" ]; then
            sudo zip -r "\${BACKUP_PATH}" /var/www/funnytalez/ 2>/dev/null || echo "⚠️ 백업 중 일부 파일 제외"
            echo "✅ 백업 완료: \${BACKUP_PATH}"
          else
            echo "ℹ️ 기존 운영 폴더가 비어있거나 없음 - 백업 생략"
          fi
          
          # Clear production directory (rm -rf {.,}* 방식)
          echo "🗑️ Clearing production directory..."
          sudo mkdir -p /var/www/funnytalez
          cd /var/www/funnytalez
          sudo rm -rf {.,}* 2>/dev/null || true
          
          # Copy new files to production directory (mv {.,}* 방식)
          echo "🚀 Copying new files to production..."
          cd ~/funnytalez_www
          sudo cp -r {.,}* /var/www/funnytalez/ 2>/dev/null || true
          
          # Set proper permissions
          sudo chown -R $EC2_USER:$EC2_USER /var/www/funnytalez
          sudo chmod -R 755 /var/www/funnytalez
          
          # Navigate to production directory for PM2 operations
          cd /var/www/funnytalez
          
          # Restart PM2 process
          echo "🔄 Managing PM2 process..."
          if pm2 list | grep -q "talez-service"; then
            echo "🔄 Restarting existing PM2 process..."
            pm2 restart talez-service
          else
            echo "🆕 Starting new PM2 process..."
            pm2 start ecosystem.config.cjs --name talez-service
          fi
          
          # Save PM2 configuration
          pm2 save
          
          echo "✅ Production deployment completed successfully!"
          echo "📊 PM2 Status:"
          pm2 status
        EOF
        
        # Clean up temporary SSH key
        rm -f /tmp/ec2_key.pem
        
        echo "🎉 AWS EC2 배포 완료!"

    - name: Remove SSH access from Security Group
      if: always() && steps.add-ssh-access.outputs.security-rule-added == 'true'
      run: |
        RUNNER_IP="${{ steps.get-ip.outputs.runner-ip }}"
        SECURITY_GROUP_ID="${{ secrets.SECURITY_GROUP_ID }}"
        
        echo "🔒 Removing SSH access for IP: $RUNNER_IP from Security Group: $SECURITY_GROUP_ID"
        
        # Remove SSH access rule
        aws ec2 revoke-security-group-ingress \
          --group-id $SECURITY_GROUP_ID \
          --protocol tcp \
          --port 22 \
          --cidr "${RUNNER_IP}/32" \
          --output text || echo "⚠️ Failed to remove SSH rule, may need manual cleanup"
        
        echo "✅ SSH access removed successfully"

    - name: Deployment Summary
      if: always()
      run: |
        echo "📊 배포 결과 요약:"
        echo "- Runner IP: ${{ steps.get-ip.outputs.runner-ip }}"
        echo "- EC2 Host: ${{ secrets.EC2_HOST }}"
        echo "- Security Group: ${{ secrets.SECURITY_GROUP_ID }}"
        echo "- GitHub Username: ${{ secrets.GH_USERNAME }}"
        if [ ${{ job.status }} == 'success' ]; then
          echo "✅ 배포 성공"
          echo "🔗 커밋: ${{ github.sha }}"
          echo "📅 시간: $(date)"
        else
          echo "❌ 배포 실패"
          echo "🔗 커밋: ${{ github.sha }}"
        fi
        echo "- SSH Access Removed: ${{ steps.add-ssh-access.outputs.security-rule-added == 'true' && 'Yes' || 'No' }}"