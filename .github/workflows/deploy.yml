name: Deploy to AWS EC2

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_TOKEN }}
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Deploy to EC2
      env:
        EC2_HOST: ${{ secrets.EC2_HOST }}
        EC2_USER: ${{ secrets.EC2_USER }}
        EC2_KEY: ${{ secrets.EC2_KEY }}
        SECURITY_GROUP_ID: ${{ secrets.SECURITY_GROUP_ID }}
        GH_USERNAME: ${{ secrets.GH_USERNAME }}
      run: |
        # EC2 키 파일 생성
        echo "$EC2_KEY" > ec2_key.pem
        chmod 600 ec2_key.pem
        
        # SSH 연결 설정
        ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts
        
        # EC2에 배포 스크립트 실행
        ssh -i ec2_key.pem -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST << 'EOF'
          set -e
          
          echo "🚀 배포 시작..."
          
          # 홈 디렉토리의 funnytalez_www 폴더로 이동
          cd ~/funnytalez_www
          
          # Git pull로 최신 소스 가져오기
          echo "📥 소스 업데이트 중..."
          git pull origin main
          
          # 의존성 설치
          echo "📦 의존성 설치 중..."
          npm install
          
          # 빌드 실행
          echo "🔨 빌드 실행 중..."
          npm run build
          
          # 정적 파일 복사
          echo "📂 정적 파일 복사 중..."
          ./copy-static-files.sh
          
          # 현재 시간으로 백업 파일명 생성
          BACKUP_NAME="funnytalez_$(date +%Y%m%d%H%M%S).zip"
          echo "💾 백업 생성: $BACKUP_NAME"
          
          # 백업 디렉토리 생성 (없는 경우)
          sudo mkdir -p /var/www/backup
          
          # 운영 소스 백업 (파일이 있는 경우만)
          if [ -d "/var/www/funnytalez" ] && [ "$(ls -A /var/www/funnytalez 2>/dev/null)" ]; then
            sudo zip -r "/var/www/backup/$BACKUP_NAME" /var/www/funnytalez/ 2>/dev/null || echo "⚠️ 백업 중 일부 파일 제외됨"
            echo "✅ 백업 완료: /var/www/backup/$BACKUP_NAME"
          else
            echo "ℹ️ 기존 운영 폴더가 비어있거나 없음 - 백업 생략"
          fi
          
          # 운영 폴더 정리
          echo "🗑️ 운영 폴더 정리 중..."
          sudo rm -rf /var/www/funnytalez/* /var/www/funnytalez/.[^.]* 2>/dev/null || true
          
          # 새 소스를 운영 폴더로 이동
          echo "📁 새 소스 배포 중..."
          sudo mkdir -p /var/www/funnytalez
          sudo cp -r ~/funnytalez_www/* /var/www/funnytalez/ 2>/dev/null || true
          sudo cp -r ~/funnytalez_www/.[^.]* /var/www/funnytalez/ 2>/dev/null || true
          
          # 권한 설정
          sudo chown -R www-data:www-data /var/www/funnytalez
          sudo chmod -R 755 /var/www/funnytalez
          
          # PM2로 서비스 재시작
          echo "🔄 서비스 재시작 중..."
          pm2 restart talez-service || pm2 start /var/www/funnytalez/ecosystem.config.cjs --name talez-service
          
          echo "✅ 배포 완료!"
          
          # 배포 상태 확인
          echo "📊 배포 상태 확인..."
          pm2 status talez-service
          
        EOF
        
        # 임시 키 파일 삭제
        rm -f ec2_key.pem
        
        echo "🎉 GitHub Actions 배포 완료!"

    - name: Notify deployment status
      if: always()
      run: |
        if [ ${{ job.status }} == 'success' ]; then
          echo "✅ 배포 성공: ${{ github.sha }}"
        else
          echo "❌ 배포 실패: ${{ github.sha }}"
        fi