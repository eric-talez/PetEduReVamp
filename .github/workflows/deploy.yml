name: Build and Deploy to AWS EC2

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # Step 1: 빌드 테스트
  build-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_TOKEN }}
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Run build test
      run: |
        echo "🔨 빌드 테스트 시작..."
        npm run build
        echo "✅ 빌드 테스트 완료"

    - name: Run copy static files
      run: |
        chmod +x copy-static-files.sh
        ./copy-static-files.sh

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-files
        path: dist/
        retention-days: 1

  # Step 2: AWS 운영서버 배포
  deploy-production:
    needs: build-test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-files
        path: dist/

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Deploy to AWS EC2 Production
      env:
        EC2_HOST: ${{ secrets.EC2_HOST }}
        EC2_USER: ${{ secrets.EC2_USER }}
        EC2_KEY: ${{ secrets.EC2_KEY }}
        SECURITY_GROUP_ID: ${{ secrets.SECURITY_GROUP_ID }}
        GH_USERNAME: ${{ secrets.GH_USERNAME }}
      run: |
        echo "🚀 AWS EC2 운영서버 배포 시작..."
        
        # EC2 키 파일 생성
        echo "$EC2_KEY" > ec2_key.pem
        chmod 600 ec2_key.pem
        
        # SSH 연결 설정
        ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts
        
        # 빌드된 파일을 tar로 압축하여 전송
        tar -czf build-package.tar.gz -C dist .
        scp -i ec2_key.pem -o StrictHostKeyChecking=no build-package.tar.gz $EC2_USER@$EC2_HOST:~/
        
        # EC2에서 배포 실행
        ssh -i ec2_key.pem -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST << 'EOF'
          set -e
          
          echo "📦 운영서버 배포 시작..."
          
          # 홈 디렉토리의 funnytalez_www 폴더에서 Git pull
          echo "📥 최신 소스 업데이트..."
          cd ~/funnytalez_www
          git pull origin main
          npm install
          npm run build
          ./copy-static-files.sh
          
          # 현재 시간으로 백업 파일명 생성
          BACKUP_NAME="funnytalez_$(date +%Y%m%d%H%M%S).zip"
          echo "💾 백업 생성: $BACKUP_NAME"
          
          # 백업 디렉토리 생성
          sudo mkdir -p /var/www/backup
          
          # 기존 운영 소스 백업
          if [ -d "/var/www/funnytalez" ] && [ "$(ls -A /var/www/funnytalez 2>/dev/null)" ]; then
            sudo zip -r "/var/www/backup/$BACKUP_NAME" /var/www/funnytalez/ 2>/dev/null || echo "⚠️ 백업 중 일부 파일 제외"
            echo "✅ 백업 완료: /var/www/backup/$BACKUP_NAME"
          fi
          
          # 운영 폴더 정리 (rm -rf {.,}* 방식)
          echo "🗑️ 운영 폴더 정리..."
          sudo rm -rf /var/www/funnytalez/{.,}* 2>/dev/null || true
          
          # 새 소스를 운영 폴더로 이동 (mv {.,}* 방식)
          echo "📁 새 소스 배포..."
          sudo mkdir -p /var/www/funnytalez
          cd ~/funnytalez_www
          sudo mv {.,}* /var/www/funnytalez/ 2>/dev/null || true
          
          # 권한 설정
          sudo chown -R www-data:www-data /var/www/funnytalez
          sudo chmod -R 755 /var/www/funnytalez
          
          # PM2 서비스 재시작
          echo "🔄 PM2 서비스 재시작..."
          pm2 restart talez-service || pm2 start /var/www/funnytalez/ecosystem.config.cjs --name talez-service
          
          echo "✅ 운영서버 배포 완료!"
          pm2 status talez-service
          
          # 정리
          rm -f ~/build-package.tar.gz
          
        EOF
        
        # 로컬 정리
        rm -f ec2_key.pem build-package.tar.gz
        
        echo "🎉 AWS EC2 배포 완료!"

    - name: Deployment Summary
      if: always()
      run: |
        echo "📊 배포 결과:"
        if [ ${{ job.status }} == 'success' ]; then
          echo "✅ 배포 성공"
          echo "🔗 커밋: ${{ github.sha }}"
          echo "📅 시간: $(date)"
        else
          echo "❌ 배포 실패"
          echo "🔗 커밋: ${{ github.sha }}"
        fi