            hospital: '동물병원',
            cafe: '애견카페',
            restaurant: '애견식당',
            park: '애견놀이터',
            grooming: '미용실',
            hotel: '애견호텔',
            training: '훈련소'
        };

        const markerIcons = {
            hospital: '🏥',
            cafe: '☕',
            restaurant: '🍽️',
            park: '🌳',
            grooming: '✂️',
            hotel: '🏨',
            training: '🎓'
        };

        // Google Maps 로드
        function loadGoogleMaps() {
            const apiKey = document.getElementById('apiKeyInput').value.trim();
            
            if (!apiKey) {
                alert('API 키를 입력해주세요!');
                return;
            }
            
            // 이미 로드된 경우
            if (isMapLoaded) {
                alert('지도가 이미 로드되었습니다!');
                return;
            }
            
            // 버튼 비활성화
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '로딩중...';
            
            // Google Maps API 스크립트 로드
            const script = document.createElement('script');
            script.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&callback=initMap`;
            script.async = true;
            script.defer = true;
            script.onerror = () => {
                alert('Google Maps API 로드 실패! API 키를 확인해주세요.');
                btn.disabled = false;
                btn.textContent = '지도 로드';
            };
            document.head.appendChild(script);
        }

        // 지도 초기화 (Google Maps API 콜백)
        window.initMap = function() {
            map = new google.maps.Map(document.getElementById('map'), {
                center: { lat: 36.5, lng: 127.8 },
                zoom: 7,
                mapTypeControl: true,
                streetViewControl: true,
                fullscreenControl: true
            });

            isMapLoaded = true;
            document.getElementById('searchInput').disabled = false;
            document.querySelector('.load-map-btn').textContent = '✓ 로드 완료';
            
            renderFacilities();
        };

        // 마커 생성
        function createMarker(facility) {
            const marker = new google.maps.Marker({
                position: { lat: facility.lat, lng: facility.lng },
                map: map,
                title: facility.name,
                label: {
                    text: markerIcons[facility.type],
                    fontSize: '20px'
                }
            });

            const infoWindow = new google.maps.InfoWindow({
                content: `
                    <div class="info-window">
                        <div class="info-window-title">${facility.name}</div>
                        <div class="info-window-type">${typeNames[facility.type]}</div>
                        <div class="info-window-info">
                            📍 ${facility.address}<br>
                            📞 ${facility.phone}<br>
                            ⭐ ${facility.rating}
                        </div>
                    </div>
                `
            });

            marker.addListener('click', () => {
                // 다른 인포윈도우 닫기
                infoWindows.forEach(iw => iw.close());
                infoWindow.open(map, marker);
            });

            infoWindows.push(infoWindow);
            return marker;
        }

        // 시설 목록 렌더링
        function renderFacilities() {
            if (!isMapLoaded) return;

            const filteredFacilities = facilities.filter(f => {
                const matchesType = currentFilter === 'all' || f.type === currentFilter;
                const matchesSearch = searchTerm === '' || 
                    f.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    f.address.toLowerCase().includes(searchTerm.toLowerCase());
                return matchesType && matchesSearch;
            });

            // 통계 업데이트
            document.getElementById('stats').textContent = 
                `총 ${filteredFacilities.length}개 시설`;

            // 목록 렌더링
            const listHTML = filteredFacilities.map(f => `
                <div class="facility-card" onclick="focusOnFacility(${f.id})">
                    <div class="facility-name">${markerIcons[f.type]} ${f.name}</div>
                    <div class="facility-type">${typeNames[f.type]}</div>
                    <div class="facility-address">📍 ${f.address}</div>
                    <div class="facility-phone">📞 ${f.phone}</div>
                    <div class="facility-rating">⭐ ${f.rating}</div>
                </div>
            `).join('');

            document.getElementById('facilitiesList').innerHTML = listHTML || 
                '<div style="padding: 24px; text-align: center; color: #999;">검색 결과가 없습니다</div>';

            // 마커 업데이트
            markers.forEach(m => m.setMap(null));
            markers = filteredFacilities.map(f => createMarker(f));
        }

        // 시설 포커스
        window.focusOnFacility = function(id) {
            const facility = facilities.find(f => f.id === id);
            if (facility && isMapLoaded) {
                map.setCenter({ lat: facility.lat, lng: facility.lng });
                map.setZoom(15);
                
                const marker = markers.find(m => m.getTitle() === facility.name);
                if (marker) {
                    google.maps.event.trigger(marker, 'click');
                }
            }
        };

        // 필터 버튼 이벤트
        document.getElementById('filterButtons').addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-btn')) {
                document.querySelectorAll('.filter-btn').forEach(btn => 
                    btn.classList.remove('active')
                );
                e.target.classList.add('active');
                currentFilter = e.target.dataset.type;
                renderFacilities();
            }
        });

        // 검색 이벤트
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchTerm = e.target.value;
            renderFacilities();
        });
    </script>
</body>
</html>
