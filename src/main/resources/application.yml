server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: petedu-platform
  profiles:
    active: development
  
  thymeleaf:
    cache: false
    mode: HTML
    encoding: UTF-8
    prefix: classpath:/templates/
    suffix: .html

logging:
  level:
    com.petedu: INFO
    org.springframework: WARN
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always