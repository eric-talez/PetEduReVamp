<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- Footer Fragment -->

        <div class="max-w-7xl mx-auto py-12 px-4 sm:px-6 lg:px-8">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
                <!-- Company Info -->
                <div class="col-span-1 md:col-span-2">
                    <div class="flex items-center mb-4">
                        <img th:src="@{/images/logo-white.png}" alt="PetEdu" class="h-8 w-auto">
                        <span class="ml-2 text-xl font-bold">PetEdu</span>
                    </div>
                    <p class="text-gray-300 text-sm mb-4">
                        AI 기반 반려동물 훈련 플랫폼으로 전문 훈련사와 함께하는 맞춤형 교육 서비스를 제공합니다.
                    </p>
                    <div class="flex space-x-4">
                        <a href="#" class="text-gray-300 hover:text-white">
                            <i class="fab fa-facebook-f"></i>
                        </a>
                        <a href="#" class="text-gray-300 hover:text-white">
                            <i class="fab fa-instagram"></i>
                        </a>
                        <a href="#" class="text-gray-300 hover:text-white">
                            <i class="fab fa-youtube"></i>
                        </a>
                        <a href="#" class="text-gray-300 hover:text-white">
                            <i class="fab fa-twitter"></i>
                        </a>
                    </div>
                </div>

                <!-- Quick Links -->
                <div>
                    <h3 class="text-sm font-semibold text-gray-400 tracking-wider uppercase mb-4">서비스</h3>
                    <ul class="space-y-2">
                        <li><a th:href="@{/courses}" class="text-sm text-gray-300 hover:text-white">강좌 찾기</a></li>
                        <li><a th:href="@{/trainers}" class="text-sm text-gray-300 hover:text-white">훈련사 찾기</a></li>
                        <li><a th:href="@{/institutes}" class="text-sm text-gray-300 hover:text-white">기관 찾기</a></li>
                        <li><a th:href="@{/events}" class="text-sm text-gray-300 hover:text-white">이벤트</a></li>
                        <li><a th:href="@{/shop}" class="text-sm text-gray-300 hover:text-white">쇼핑</a></li>
                    </ul>
                </div>

                <!-- Support -->
                <div>
                    <h3 class="text-sm font-semibold text-gray-400 tracking-wider uppercase mb-4">고객지원</h3>
                    <ul class="space-y-2">
                        <li><a th:href="@{/help}" class="text-sm text-gray-300 hover:text-white">도움말</a></li>
                        <li><a th:href="@{/contact}" class="text-sm text-gray-300 hover:text-white">문의하기</a></li>
                        <li><a th:href="@{/faq}" class="text-sm text-gray-300 hover:text-white">자주 묻는 질문</a></li>
                        <li><a th:href="@{/terms}" class="text-sm text-gray-300 hover:text-white">이용약관</a></li>
                        <li><a th:href="@{/privacy}" class="text-sm text-gray-300 hover:text-white">개인정보처리방침</a></li>
                    </ul>
                </div>
            </div>

            <div class="mt-8 border-t border-gray-700 pt-8">
                <div class="flex flex-col md:flex-row justify-between items-center">
                    <p class="text-sm text-gray-400">
                        © 2024 PetEdu Platform. All rights reserved.
                    </p>
                    <div class="mt-4 md:mt-0 flex space-x-6">
                        <span class="text-sm text-gray-400">고객센터: 1588-0000</span>
                        <span class="text-sm text-gray-400">이메일: support@petedu.com</span>
                    </div>
                </div>

</html>
