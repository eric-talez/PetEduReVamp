<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- 유틸리티 네비게이션 프래그먼트 -->
    <div th:fragment="utility-nav" class="utility-nav">
        <div class="container utility-nav-container">
            <ul class="utility-links">
                <li><a href="javascript:void(0)" onclick="goToMainService()" class="main-service-link">메인 서비스</a></li>
                <li th:if="${!session.user}"><a th:href="@{/auth/login}">로그인</a></li>
                <li th:if="${!session.user}"><a th:href="@{/auth/register}">회원가입</a></li>
                <li th:if="${session.user}"><a th:href="@{/my-account}">마이페이지</a></li>
                <li><a th:href="@{/customer-service}">고객센터</a></li>
            </ul>
        </div>
    </div>
    
    <!-- 메인 헤더 프래그먼트 -->
    <header th:fragment="main-header">
        <div class="container">
            <div class="header-top">
                <!-- 로고 -->
                <a th:href="@{/shop}" class="logo">
                    <div class="logo-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 16h-2v-6h2v6zm-1-9a1 1 0 1 1 0-2 1 1 0 0 1 0 2zm5 9h-2v-6h2v6zm-1-9a1 1 0 1 1 0-2 1 1 0 0 1 0 2z"/>
                        </svg>
                    </div>
                    <span class="logo-text">테일즈 쇼핑</span>
                </a>
                
                <!-- 검색창 -->
                <div class="search-container">
                    <form th:action="@{/shop/search}" method="get">
                        <div class="search-input-wrapper">
                            <input type="text" name="query" class="search-input" placeholder="상품을 검색해보세요" 
                                   th:value="${param.query != null ? param.query : ''}">
                            <button type="submit" class="search-button">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="11" cy="11" r="8"></circle>
                                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                                </svg>
                            </button>
                        </div>
                    </form>
                    <div class="search-suggestions">
                        <div class="suggestion-category">인기 검색어</div>
                        <ul class="suggestion-list">
                            <li class="suggestion-item">강아지 사료</li>
                            <li class="suggestion-item">고양이 장난감</li>
                            <li class="suggestion-item">강아지 옷</li>
                            <li class="suggestion-item">반려동물 케리어</li>
                            <li class="suggestion-item">자동급식기</li>
                        </ul>
                    </div>
                </div>
                
                <!-- 사용자 액션 버튼들 -->
                <div class="user-actions">
                    <button class="theme-toggle-btn" id="theme-toggle">
                        <div id="dark-mode-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="5"></circle>
                                <line x1="12" y1="1" x2="12" y2="3"></line>
                                <line x1="12" y1="21" x2="12" y2="23"></line>
                                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                                <line x1="1" y1="12" x2="3" y2="12"></line>
                                <line x1="21" y1="12" x2="23" y2="12"></line>
                                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                            </svg>
                        </div>
                    </button>
                    
                    <a th:href="@{/my-account}" class="action-item">
                        <div class="action-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                        </div>
                        <span>마이페이지</span>
                    </a>
                    
                    <a th:href="@{/wishlist}" class="action-item">
                        <div class="action-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"></path>
                            </svg>
                        </div>
                        <span>찜</span>
                    </a>
                    
                    <a th:href="@{/cart}" class="action-item">
                        <div class="action-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="9" cy="21" r="1"></circle>
                                <circle cx="20" cy="21" r="1"></circle>
                                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                            </svg>
                            <span class="badge" th:text="${session.cartCount ?: 0}">0</span>
                        </div>
                        <span>장바구니</span>
                    </a>
                </div>
            </div>
        </div>
        
        <!-- 메인 네비게이션 -->
        <div class="main-nav">
            <div class="container nav-container">
                <div class="category-menu">
                    <div class="category-menu-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </div>
                    <span>카테고리</span>
                    <div class="category-dropdown">
                        <ul class="category-list">
                            <li th:each="category : ${categories}" class="category-item" 
                                th:onclick="'goToCategory(\'' + ${category.name} + '\')'">
                                <span th:text="${category.name}">카테고리 이름</span>
                                <span class="category-item-icon">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <polyline points="9 18 15 12 9 6"></polyline>
                                    </svg>
                                </span>
                            </li>
                        </ul>
                    </div>
                </div>
                
                <ul class="nav-menu">
                    <li class="nav-menu-item">
                        <a th:href="@{/shop}" class="nav-menu-link" th:classappend="${#httpServletRequest.requestURI == '/shop' ? 'active' : ''}">홈</a>
                    </li>
                    <li class="nav-menu-item">
                        <a th:href="@{/shop/best}" class="nav-menu-link" th:classappend="${#httpServletRequest.requestURI == '/shop/best' ? 'active' : ''}">베스트</a>
                    </li>
                    <li class="nav-menu-item">
                        <a th:href="@{/shop/new}" class="nav-menu-link" th:classappend="${#httpServletRequest.requestURI == '/shop/new' ? 'active' : ''}">신상품</a>
                    </li>
                    <li class="nav-menu-item">
                        <a th:href="@{/shop/sale}" class="nav-menu-link" th:classappend="${#httpServletRequest.requestURI == '/shop/sale' ? 'active' : ''}">특가</a>
                    </li>
                    <li class="nav-menu-item">
                        <a th:href="@{/shop/promotion}" class="nav-menu-link" th:classappend="${#httpServletRequest.requestURI == '/shop/promotion' ? 'active' : ''}">기획전</a>
                    </li>
                    <li class="nav-menu-item">
                        <a th:href="@{/shop/event}" class="nav-menu-link" th:classappend="${#httpServletRequest.requestURI == '/shop/event' ? 'active' : ''}">이벤트</a>
                    </li>
                    <li class="nav-menu-item">
                        <a th:href="@{/shop/brand}" class="nav-menu-link" th:classappend="${#httpServletRequest.requestURI == '/shop/brand' ? 'active' : ''}">브랜드</a>
                    </li>
                    <li class="nav-menu-item">
                        <a th:href="@{/shop/edu-products}" class="nav-menu-link" th:classappend="${#httpServletRequest.requestURI == '/shop/edu-products' ? 'active' : ''}">교육 연계상품</a>
                    </li>
                </ul>
            </div>
        </div>
    </header>
</body>
</html>
