<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title ?: 'PetEdu Platform'}">PetEdu Platform</title>
    <meta th:content="${description ?: 'AI 기반 반려동물 교육 플랫폼'}" name="description">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #4f46e5;
            --secondary-color: #06b6d4;
            --accent-color: #f59e0b;
            --dark-color: #1f2937;
            --light-color: #f8fafc;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--light-color);
        }
        
        .navbar-brand {
            font-weight: 700;
            color: var(--primary-color) !important;
        }
        
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(180deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            transition: all 0.3s ease;
        }
        
        .sidebar .nav-link {
            color: rgba(255, 255, 255, 0.8);
            padding: 12px 20px;
            border-radius: 8px;
            margin: 5px 0;
            transition: all 0.3s ease;
        }
        
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            transform: translateX(5px);
        }
        
        .main-content {
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin: 20px;
            padding: 30px;
        }
        
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            border: none;
            border-radius: 10px;
            padding: 10px 25px;
            font-weight: 500;
        }
        
        .badge-status {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .spring-boot-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(34, 197, 94, 0.3);
            z-index: 1000;
        }
    </style>
</head>
<body>
    <!-- Spring Boot 실행 상태 표시 -->
    <div class="spring-boot-indicator">
        <i class="fas fa-leaf me-2"></i>Spring Boot Active
    </div>

    <div class="container-fluid">
        <div class="row">
            <!-- 사이드바 -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse">
                <div class="position-sticky pt-3">
                    <div class="text-center mb-4">
                        <h4 class="text-white">
                            <i class="fas fa-paw me-2"></i>PetEdu
                        </h4>
                        <small class="text-light opacity-75">Spring Boot Platform</small>
                    </div>
                    
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" th:classappend="${page == 'home'} ? 'active'" href="/">
                                <i class="fas fa-home me-2"></i>홈
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:classappend="${page == 'dashboard'} ? 'active'" href="/dashboard">
                                <i class="fas fa-chart-bar me-2"></i>대시보드
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:classappend="${page == 'courses'} ? 'active'" href="/courses">
                                <i class="fas fa-graduation-cap me-2"></i>강좌
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:classappend="${page == 'pets'} ? 'active'" href="/pets">
                                <i class="fas fa-dog me-2"></i>반려동물
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:classappend="${page == 'trainers'} ? 'active'" href="/trainers">
                                <i class="fas fa-user-tie me-2"></i>훈련사
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:classappend="${page == 'community'} ? 'active'" href="/community">
                                <i class="fas fa-users me-2"></i>커뮤니티
                            </a>
                        </li>
                        
                        <hr class="text-light opacity-25">
                        
                        <li class="nav-item">
                            <a class="nav-link" href="/api/docs">
                                <i class="fas fa-book me-2"></i>API 문서
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/actuator/health">
                                <i class="fas fa-heartbeat me-2"></i>헬스 체크
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/admin">
                                <i class="fas fa-cog me-2"></i>관리자
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- 메인 컨텐츠 -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="main-content">
                    <!-- 헤더 영역 -->
                    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-2 mb-3 border-bottom">
                        <h1 class="h2" th:text="${pageTitle ?: '페이지'}">페이지</h1>
                        <div class="btn-toolbar mb-2 mb-md-0">
                            <div class="btn-group me-2">
                                <span class="badge-status">
                                    <i class="fas fa-check-circle me-1"></i>Spring Boot
                                </span>
                            </div>
                        </div>
                    </div>

                    <!-- 페이지별 컨텐츠 -->
                    <div th:replace="${content}">
                        <p>컨텐츠를 로드하는 중...</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- 커스텀 스크립트 -->
    <script>
        // Spring Boot 애플리케이션 상태 확인
        function checkSpringBootStatus() {
            fetch('/actuator/health')
                .then(response => response.json())
                .then(data => {
                    const indicator = document.querySelector('.spring-boot-indicator');
                    if (data.status === 'UP') {
                        indicator.innerHTML = '<i class="fas fa-leaf me-2"></i>Spring Boot Active';
                        indicator.style.background = 'linear-gradient(135deg, #22c55e 0%, #16a34a 100%)';
                    }
                })
                .catch(error => {
                    const indicator = document.querySelector('.spring-boot-indicator');
                    indicator.innerHTML = '<i class="fas fa-exclamation-triangle me-2"></i>연결 오류';
                    indicator.style.background = 'linear-gradient(135deg, #ef4444 0%, #dc2626 100%)';
                });
        }
        
        // 페이지 로드 시 상태 확인
        document.addEventListener('DOMContentLoaded', checkSpringBootStatus);
        
        // 30초마다 상태 확인
        setInterval(checkSpringBootStatus, 30000);
    </script>
</body>
</html>
