<svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2BAA61;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34D473;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="16" height="16" fill="url(#faviconGradient)" rx="2"/>
  
  <!-- Letter T -->
  <text x="8" y="12" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">
    T
  </text>
  
  <!-- Tiny Paw -->
  <g transform="translate(12, 3)">
    <circle cx="0" cy="0" r="0.5" fill="white"/>
    <circle cx="1" cy="0.5" r="0.5" fill="white"/>
    <circle cx="2" cy="0" r="0.5" fill="white"/>
    <ellipse cx="1" cy="2" rx="1" ry="1.5" fill="white"/>
  </g>
</svg>