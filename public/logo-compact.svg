<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="compactGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2BAA61;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34D473;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="16" cy="16" r="15" fill="url(#compactGradient)" stroke="#2BAA61" stroke-width="2"/>
  
  <!-- Letter T -->
  <text x="16" y="22" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">
    T
  </text>
  
  <!-- Small Paw Print -->
  <g transform="translate(24, 8)">
    <circle cx="0" cy="0" r="1.5" fill="white"/>
    <circle cx="3" cy="1" r="1.5" fill="white"/>
    <circle cx="6" cy="0" r="1.5" fill="white"/>
    <ellipse cx="3" cy="5" rx="2.5" ry="3" fill="white"/>
  </g>
