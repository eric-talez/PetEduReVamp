<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 대시보드</title>
  <style>
    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    .container {
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      padding: 2rem;
      max-width: 90%;
      width: 500px;
    }
    h1 {
      margin-top: 0;
      color: #333;
    }
    p {
      color: #666;
      line-height: 1.6;
    }
    .loader {
      margin: 2rem auto;
      width: 50px;
      height: 50px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .redirect-message {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>관리자 대시보드</h1>
    <p>PetEdu 관리자 대시보드로 리디렉션 중입니다.</p>
    <div class="loader"></div>
    <p class="redirect-message">잠시만 기다려주세요...</p>
  </div>
  
  <script>
    // DOM이 로드된 후에 실행
    document.addEventListener('DOMContentLoaded', function() {
      console.log('관리자 대시보드 정적 페이지 로드됨');
      
      // 메인 앱 - 적절한 라우트로 리디렉션
      setTimeout(function() {
        // 자바스크립트로 쿠키 값을 가져오는 함수
        function getCookie(name) {
          const value = `; ${document.cookie}`;
          const parts = value.split(`; ${name}=`);
          if (parts.length === 2) return parts.pop().split(';').shift();
        }
        
        // 세션 정보 확인
        const isLoggedIn = getCookie('petedu.sid');
        
        if (isLoggedIn) {
          // 로그인된 경우 홈페이지로 이동 후 SPA가 라우팅 처리
          window.location.href = '/#/admin/dashboard';
        } else {
          // 로그인되지 않은 경우 로그인 페이지로
          window.location.href = '/';
        }
      }, 1000);
    });
  </script>
</body>
</html>
