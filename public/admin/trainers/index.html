<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>훈련사 관리 - PetEduPlatform 관리자</title>
  <meta name="description" content="PetEduPlatform 훈련사 관리 시스템. 훈련사 정보, 자격증, 상태 관리 및 검증 기능 제공.">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Noto Sans KR', sans-serif;
      background-color: #f8f9fa;
      color: #333;
    }
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(0, 153, 255, 0.2);
      border-radius: 50%;
      border-top-color: #0099ff;
      animation: spin 1s ease-in-out infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    h1 {
      margin-top: 0;
      color: #333;
      font-size: 1.5rem;
    }
    p {
      color: #666;
      max-width: 80%;
      margin: 0 auto;
    }
  </style>
  <script>
    // 해시 기반 라우팅을 위한 리디렉션 스크립트
    window.addEventListener('DOMContentLoaded', function() {
      // 이미 해시가 있다면 리디렉션하지 않음
      if (window.location.hash) return;
      
      // 현재 URL에서 특수 경로 추출
      const path = window.location.pathname;
      console.log('현재 경로:', path);
      
      // 관리자 하위 경로를 해시 경로로 변환
      if (path.includes('/admin/')) {
        // '/admin/' 이후의 경로 부분 추출
        const adminPath = path.substring(path.indexOf('/admin/'));
        console.log('관리자 경로:', adminPath);
        
        // 해시 경로로 변환하여 리디렉션
        window.location.href = '/#' + adminPath;
      }
    });
  </script>
</head>
<body>
  <div class="loading-container">
    <div class="spinner"></div>
    <h1>훈련사 관리 페이지 로드 중</h1>
    <p>PetEduPlatform 훈련사 관리 시스템으로 이동합니다.</p>
  </div>
</body>
</html>
