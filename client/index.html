<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>PetEduPlatform - 반려견 교육 플랫폼</title>
    <meta name="description" content="PetEduPlatform과 함께 전문 훈련사의 체계적인 교육으로 더 행복한 반려생활을 시작하세요." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Open Graph tags -->
    <meta property="og:title" content="PetEduPlatform - 반려견 교육 플랫폼" />
    <meta property="og:description" content="전문 훈련사의 체계적인 교육으로 더 행복한 반려생활을 시작하세요." />
    <meta property="og:type" content="website" />
    <!-- 카카오 맵 API -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=<%= import.meta.env.VITE_KAKAO_MAPS_API_KEY %>&libraries=services,clusterer,drawing"></script>
    <!-- 초기 테마 설정 스크립트 -->
    <script>
      // 저장된 테마 확인
      const savedTheme = localStorage.getItem('petedu-theme');
      if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.add('light');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
