[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# 프로덕션 환경 설정
[context.production]
  environment = { NODE_ENV = "production" }

# 스테이징 환경 설정 (develop 브랜치)
[context.develop]
  environment = { NODE_ENV = "development" }

# 리다이렉트 설정
[[redirects]]
  from = "/api/*"
  to = "https://api.talez.co.kr/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 헤더 설정
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "default-src 'self'; connect-src 'self' https://api.talez.co.kr https://kauth.kakao.com https://nid.naver.com https://*.openai.com https://api.stripe.com; script-src 'self' 'unsafe-inline' https://dapi.kakao.com https://t1.daumcdn.net https://developers.kakao.com https://maps.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://*.kakao.com https://*.daumcdn.net https://*.naver.com https://maps.googleapis.com; font-src 'self' https://fonts.gstatic.com;"
    Cache-Control = "public, max-age=0, must-revalidate"